name: Update World Cup Data

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - "scripts/**"
      - "config/**"
      - ".github/workflows/**"

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch + compute
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          WC_COMP: ${{ vars.WC_COMP }}
        run: node scripts/update-data.mjs
      - name: Commit if changed
        run: |
          git config user.name "wc-data-bot"
          git config user.email "wc-data-bot@users.noreply.github.com"
          git add data/state.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: refresh World Cup data [skip ci]"
            git push
          fi
