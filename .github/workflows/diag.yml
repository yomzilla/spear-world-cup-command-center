name: Diag

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run diagnostic
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          WC_COMP: ${{ vars.WC_COMP }}
        run: node scripts/diag.mjs
